    <!-- 4. Simulating a POST Request -->
    <script>
        $.ajax({
            url: "https://jsonplaceholder.typicode.com/posts",
            method: "POST",
            data: JSON.stringify({
                title: "Greetings Everyone",
                body: "This is a Web Technology Lab Exercise 4",
                userId: 2
            }),
            contentType: "application/json; charset=UTF-8",
            success: function(response) {
                console.log("AJAX POST:", response);
                document.getElementById("postOutput").textContent = JSON.stringify(response, null, 2);
            }
        });
    </script>
    <pre id="postOutput">Sending POST data...</pre>

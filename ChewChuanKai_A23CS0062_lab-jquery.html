<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Lab Starter File</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .box {
            border: 1px solid black;
            padding: 10px;
            margin-top: 15px;
        }

        #taskList li {
            cursor: pointer;
        }

        button {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1 id="mainTitle">Student Task Manager</h1>

<p class="info">Welcome to the jQuery lab activity.</p>
<p class="info">You will learn selection, manipulation, traversal, and event handling.</p>

<input type="text" id="taskInput" placeholder="Enter a task">

<br><br>

<button id="addTaskBtn">Add Task</button>
<button id="removeTaskBtn">Remove Last Task</button>

<ul id="taskList">
    <li class="task-item">Complete HTML exercise</li>
    <li class="task-item">Review CSS notes</li>
</ul>

<div class="box">
    <h3>Announcement</h3>
    <p id="message">No new updates yet.</p>
</div>

<!-- jQuery CDN -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script>

$(document).ready(function(){

    // =====================================
    // Write your jQuery code below
    // =====================================

    // Task 1:
    // Change the title text
    $('#mainTitle').text('Updated Student Task Manager');

    // Task 2:
    // Change text color of info paragraphs
    $('.info').css('color', 'blue');

    // Task 3:
    // Display list items in console
    $('#taskList li').each(function() {
        console.log($(this).text());
    });

    // Task 4:
    // Append new paragraph
    $('.box').append('<p>New paragraph added to the box.</p>');

    // Task 5:
    // Add task when button clicked
    $('#addTaskBtn').click(function() {
        const taskText = $('#taskInput').val().trim();

        if (taskText === '') {
            alert('Please enter a task before adding.');
            return;
        }

        $('#taskList').append('<li class="task-item">' + taskText + '</li>');
        $('#taskInput').val('');
    });

    // Task 6:
    // Remove last task
    $('#removeTaskBtn').click(function() {
        $('#taskList li:last').remove();
    });

    // Task 7:
    // Change parent background color
    $('#message').parent().css('background-color', 'lightyellow');

    // Task 8:
    // Display children tag names
    $('.box').children().each(function() {
        console.log($(this).prop('tagName'));
    });

    // Task 9:
    // Make next sibling bold
    $('#taskList li:first').next().css('font-weight', 'bold');

    // Task 10:
    // Display input text while typing
    $('#taskInput').on('input', function() {
        $('#message').text($(this).val());
    });


    // Task 11:
    // Change border on mouse enter and leave
    $('.box').hover(
        function() {
            $(this).css('border-color', 'tomato');
        },
        function() {
            $(this).css('border-color', 'black');
        }
    );

    let clickTimer;

    // Task 12:
    // Show alert when task clicked
    $('#taskList').on('click', '.task-item', function() {
        const $item = $(this);

        clickTimer = setTimeout(function() {
            alert('Task clicked: ' + $item.text().trim());
        }, 250);
    });

    // Task 13:
    // Integration task
    $('#taskList').on('dblclick', '.task-item', function() {
        clearTimeout(clickTimer);
        $(this).remove();
    });

});

</script>

</body>
</html>
